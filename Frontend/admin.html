<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>NovaCart Admin</title>

    <link
        rel="stylesheet"
        href="admin.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <div class="container">

        <h1>
            NovaCart Admin Panel
        </h1>



        <div class="stats-container">

            <div class="stat-card">
                 Products:
                <span id="totalProducts">0</span>
            </div>

            <div class="stat-card">
                Orders:
                <span id="totalOrders">0</span>
            </div>

        </div>
        <div class="form-section">

            <input
                type="text"
                id="name"
                placeholder="Product Name">

            <input
                type="number"
                id="price"
                placeholder="Price">

            <input
                type="text"
                id="category"
                placeholder="Category">

            <input
                type="number"
                id="rating"
                placeholder="Rating">

            <input
                type="text"
                id="image"
                placeholder="Image URL">

            <textarea
                id="description"
                placeholder="Description">
            </textarea>


            <button
                onclick="addProduct()">

                Add Product

            </button>

        </div>

        <h2>
            Existing Products
        </h2>

        <table>

            <thead>

                <tr>

                    <th>ID</th>

                    <th>Name</th>

                    <th>Price</th>

                    <th>Category</th>

                    <th>Actions</th>

                </tr>

            </thead>

            <tbody id="productTable">

            </tbody>

        </table>

    </div>

    <script src="admin.js"></script>

</body>

</html>
