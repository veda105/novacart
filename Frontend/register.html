<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaCart Register</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#07152f,#0d2348);
color:white;
}

.container{
width:400px;
padding:40px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:20px;
box-shadow:0 0 30px rgba(0,0,0,0.3);
}

.logo{
text-align:center;
font-size:2rem;
font-weight:700;
color:#42b7ff;
margin-bottom:20px;
}

h2{
text-align:center;
margin-bottom:25px;
}

.input-group{
margin-bottom:20px;
}

.input-group input{
width:100%;
padding:12px;
border:none;
outline:none;
border-radius:10px;
background:rgba(255,255,255,0.1);
color:white;
}

.input-group input::placeholder{
color:#ccc;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#42b7ff;
color:white;
font-size:1rem;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.message{
margin-top:15px;
text-align:center;
font-size:0.9rem;
}

.login-link{
margin-top:20px;
text-align:center;
}

.login-link a{
color:#42b7ff;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
NovaCart
</div>

<h2>Create Account</h2>

<div class="input-group">
<input type="text" id="username" placeholder="Username">
</div>

<div class="input-group">
<input type="email" id="email" placeholder="Email">
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password">
</div>

<button onclick="registerUser()">
Register
</button>

<div class="message" id="message"></div>

<div class="login-link">
Already have an account?
<a href="login.html">Login</a>
</div>

</div>

<script>

async function registerUser(){

const username =
document.getElementById("username").value;

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

const response = await fetch(
"http://127.0.0.1:8000/register",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username,
email,
password
})
}
);

const data =
await response.json();

document.getElementById(
"message"
).innerHTML =
"✅ Registration Successful";

console.log(data);

}
catch(error){

document.getElementById(
"message"
).innerHTML =
"❌ Registration Failed";

console.log(error);

}

}

</script>

</body>

</html>
