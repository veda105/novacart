<!DOCTYPE html>
<html>
<head>
<title>NovaCart Login</title>
</head>

<body>

<h1>Login</h1>

<input
id="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button onclick="loginUser()">
Login
</button>

<p id="message"></p>

<script>

async function loginUser(){

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    console.log({
        email,
        password
    });

    const response =
    await fetch(
        "https://novacart-production-fb18.up.railway.app/login",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                email,
                password
            })
        }
    );

    const data =
    await response.json();

    console.log(data);

    if(data.access_token){

    localStorage.setItem(
        "token",
        data.access_token
    );

    localStorage.setItem(
        "username",
        data.username
    );

    localStorage.setItem(
        "role",
        data.role
    );

    if(data.role === "admin"){

        window.location.href =
        "admin.html";

    }
    else{

        window.location.href =
        "ecommerce.html";

    }

}else{

        document.getElementById(
            "message"
        ).innerText =
        "Invalid Credentials";

    }
}

</script>

</body>
</html>
