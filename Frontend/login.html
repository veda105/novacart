<!DOCTYPE html>
<html>
<head>
<title>NovaCart Login</title>
</head>

<body>

<h1>Login</h1>

<input
id="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button onclick="loginUser()">
Login
</button>

<p id="message"></p>

<script>

async function loginUser(){

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    const response =
    console.log({
    email,
    password
});
    await fetch(
        "https://novacart-production-fb18.up.railway.app/login",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                email,
                password
            })
        }
    );

    const data =
    await response.json();

    console.log(data);

    if(data.access_token){

        localStorage.setItem(
            "token",
            data.access_token
        );

        localStorage.setItem(
            "username",
            data.username
        );

        window.location.href =
        "ecommerce.html";

    }else{

        document.getElementById(
            "message"
        ).innerText =
        "Invalid Credentials";

    }
}

const data =
await response.json();

localStorage.setItem(
    "token",
    data.access_token
);

localStorage.setItem(
    "username",
    data.username
);

if(data.access_token){

window.location.href =
"ecommerce.html";

}

document.getElementById(
"message"
).innerText =
data.access_token
? "Login Successful"
: "Invalid Credentials";


</script>

</body>
</html>
