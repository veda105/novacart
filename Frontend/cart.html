<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>NovaCart Cart</title>

<link
rel="stylesheet"
href="ecommerce.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

.cart-page{

max-width:1400px;

margin:auto;

padding:60px 8%;
}

.cart-title{

font-size:3rem;

margin-bottom:40px;
}

.cart-container{

display:grid;

grid-template-columns:2fr 1fr;

gap:30px;
}

.cart-items{

display:flex;

flex-direction:column;

gap:20px;
}

.cart-item{

background:
rgba(255,255,255,0.05);

border:
1px solid rgba(255,255,255,0.08);

border-radius:24px;

padding:20px;

display:flex;

gap:20px;

align-items:center;
}

.cart-item img{

width:150px;

height:150px;

object-fit:cover;

border-radius:18px;
}

.item-info{

flex:1;
}

.item-info h3{

margin-bottom:10px;
}

.item-price{

color:#38BDF8;

font-size:1.2rem;

font-weight:600;
}

.remove-btn{

margin-top:15px;

background:#EF4444;

border:none;

padding:10px 18px;

border-radius:12px;

color:white;

cursor:pointer;
}

.summary{

background:
rgba(255,255,255,0.05);

border:
1px solid rgba(255,255,255,0.08);

border-radius:24px;

padding:30px;

height:fit-content;
}

.summary h2{

margin-bottom:25px;
}

.summary-row{

display:flex;

justify-content:space-between;

margin-bottom:15px;
}

.total{

font-size:1.4rem;

font-weight:700;

margin-top:20px;
}

.checkout-btn{

width:100%;

margin-top:25px;

padding:15px;

border:none;

border-radius:14px;

background:#38BDF8;

color:white;

font-weight:600;

cursor:pointer;
}

.empty-cart{

text-align:center;

padding:100px 20px;

color:#94A3B8;
}

@media(max-width:1000px){

.cart-container{

grid-template-columns:1fr;
}

.cart-item{

flex-direction:column;

text-align:center;
}

}

</style>

</head>

<body>

<nav class="navbar">

<div class="logo">
NovaCart
</div>

<div class="nav-right">

<a href="ecommerce.html">
🏠 Home
</a>

</div>

</nav>

<div class="cart-page">

<h1 class="cart-title">
Shopping Cart
</h1>

<div
id="cartContent">

</div>

</div>

<script>

let cart =
JSON.parse(
localStorage.getItem("cart")
) || [];

const container =
document.getElementById(
"cartContent"
);

function renderCart(){

if(cart.length === 0){

container.innerHTML =

`
<div class="empty-cart">

<h2>
Your cart is empty
</h2>

<p>
Start shopping to add products.
</p>

</div>
`;

return;
}

let subtotal = 0;

let itemsHTML = "";

cart.forEach(
(product,index)=>{

subtotal += product.price;

itemsHTML +=

`

<div class="cart-item">

<img src="${product.image}">

<div class="item-info">

<h3>
${product.name}
</h3>

<p class="item-price">

₹${product.price.toLocaleString()}

</p>

<button
class="remove-btn"
onclick="removeItem(${index})">

Remove

</button>

</div>

</div>

`;

});

const shipping = 99;

const total =
subtotal + shipping;

container.innerHTML =

`

<div class="cart-container">

<div class="cart-items">

${itemsHTML}

</div>

<div class="summary">

<h2>
Order Summary
</h2>

<div class="summary-row">

<span>
Subtotal
</span>

<span>

₹${subtotal.toLocaleString()}

</span>

</div>

<div class="summary-row">

<span>
Shipping
</span>

<span>

₹${shipping}

</span>

</div>

<hr>

<div
class="summary-row total">

<span>
Total
</span>

<span>

₹${total.toLocaleString()}

</span>

</div>

<button
class="checkout-btn"
onclick="goCheckout()">

Proceed To Checkout

</button>

</div>

</div>

`;

}

function removeItem(index){

cart.splice(index,1);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

renderCart();

}

function goCheckout(){

window.location.href =
"checkout.html";

}



function goCheckout(){

window.location.href =
"checkout.html";

}

renderCart();
</script>

</body>

</html>
